name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Disable shallow clone

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: 17
          distribution: 'adopt'

      - name: Generate JaCoCo Coverage Report
        run: ./mvnw clean verify jacoco:report

      - name: Analyze with SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=nfmh_user-service -Dsonar.organization=nfmh -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
