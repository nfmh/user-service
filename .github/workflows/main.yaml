name: build and deploy

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: metal-being-420005
  REGION: europe-west3
  REGISTRY_NAME: europe-west3-docker.pkg.dev/metal-being-420005
  IMAGE_NAME: user-service
  IMAGE_TAG: test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Disable shallow clone

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: 17
          distribution: 'adopt'

      - name: Generate JaCoCo Coverage Report
        run: ./mvnw clean verify jacoco:report

      - name: Run Maven build process
        run: ./mvnw clean package  # or ./mvnw clean install if needed

      - name: Analyze with SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=nfmh_user-service -Dsonar.organization=nfmh -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v0.2.0
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
          export_default_credentials: true

      - name: Log in to Google Cloud Artifact Registry
        run: gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "europe-west3-docker.pkg.dev"

      - name: Set DateTime as IMAGE_TAG
        id: datetime
        run: echo "::set-output name=DATETIME::$(date '+%Y%m%d%H%M%S')"

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }}.${{ steps.datetime.outputs.DATETIME }}
          docker build -t "${REGISTRY_NAME}/${IMAGE_NAME}:${IMAGE_TAG}" -f Dockerfile .
          docker push "${REGISTRY_NAME}/${IMAGE_NAME}:${IMAGE_TAG}"
